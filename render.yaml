services:
  - type: web
    name: ipocal
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      # Free plan does not support persistent disks.
      # SQLite cache will reset on redeploy/restart; app will refetch data.
      - key: IPOCAL_DB_PATH
        value: "/tmp/data.sqlite3"

